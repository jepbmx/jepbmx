name: generate-snake

on:
  schedule:
    - cron: "0 0 * * *"  # se actualiza una vez al día
  workflow_dispatch:      # también puedes lanzarlo manualmente desde la pestaña "Actions"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: jepbmx
          outputs: |
            dist/snake.svg?color_dots=#0d1b2a,#1b263b,#2f4865,#4f7298,#7c9cc4&color_snake=#9d2449

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
